<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dragon Heart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dh-magenta': '#FF1493',
                        'dh-pink': '#FF69B4',
                        'dh-gold': '#C930AE',
                        'dh-gold-dark': '#DAA520',
                        'dh-purple': '#4B0082',
                        'dh-purple-light': '#6A0DAD',
                        'dh-dark': '#0A0A0A',
                        'dh-darker': '#000000',
                    },
                    fontFamily: {
                        'display': ['Cinzel', 'serif'],
                        'sans': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        
        #loginModal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        #adminContent {
            display: none;
        }
        
        #adminContent.authenticated {
            display: block;
        }
    </style>
</head>
<body class="font-sans text-white antialiased bg-dh-dark min-h-screen">
    
    <!-- Modal de Login -->
    <div id="loginModal">
        <div class="bg-gradient-dh border-2 border-dh-magenta rounded-2xl p-8 max-w-md w-full mx-4">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-dh-magenta to-dh-purple rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="font-display text-3xl font-bold text-gradient mb-2">Acesso Restrito</h2>
                <p class="text-gray-400">Painel Administrativo Dragon Heart</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Usuário</label>
                    <input type="text" id="username" required autocomplete="username"
                        class="w-full px-4 py-3 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Senha</label>
                    <input type="password" id="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                </div>
                
                <div id="loginError" class="hidden text-red-400 text-sm text-center p-2 bg-red-900/20 rounded">
                    Usuário ou senha incorretos
                </div>
                
                <button type="submit" 
                    class="w-full px-6 py-3 bg-gradient-to-r from-dh-magenta to-dh-purple rounded-full font-bold text-lg hover:shadow-glow-magenta transition-all">
                    Entrar
                </button>
            </form>
        </div>
    </div>
    
    <!-- Conteúdo Admin -->
    <div id="adminContent">
        <div class="container mx-auto px-6 py-8">
            <header class="mb-8 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="assets/images/logo.jpeg" alt="Dragon Heart" class="w-12 h-12 object-contain rounded-lg">
                    <div>
                        <h1 class="font-display text-4xl font-bold text-gradient mb-2">Dragon Heart Admin</h1>
                        <p class="text-gray-400">Gerenciamento de Produtos</p>
                    </div>
                </div>
                <button id="logoutBtn" class="px-4 py-2 border border-dh-magenta text-dh-magenta rounded-lg hover:bg-dh-magenta hover:text-white transition-all">
                    Sair
                </button>
            </header>

            <div class="grid md:grid-cols-2 gap-8">
                <!-- Formulário de Adicionar Produto -->
                <div class="bg-gradient-dh border border-dh-magenta/20 rounded-2xl p-6">
                    <h2 class="font-display text-2xl font-bold mb-6 text-dh-gold">Adicionar Novo Produto</h2>
                    
                    <form id="formProduto" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Nome do Produto *</label>
                            <input type="text" id="nome" required 
                                class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Descrição</label>
                            <textarea id="descricao" rows="3"
                                class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Preço (R$) *</label>
                                <input type="number" id="preco" step="0.01" required
                                    class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Preço Promocional</label>
                                <input type="number" id="preco_promocional" step="0.01"
                                    class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Categoria *</label>
                                <select id="categoria_id" required
                                    class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Estoque *</label>
                                <input type="number" id="estoque" required value="0"
                                    class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Badge</label>
                            <select id="badge"
                                class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none">
                                <option value="">Nenhum</option>
                                <option value="NOVO">NOVO</option>
                                <option value="TOP">TOP</option>
                                <option value="EXCLUSIVO">EXCLUSIVO</option>
                            </select>
                        </div>

                        <!-- Slug gerado automaticamente (oculto) -->
                        <input type="hidden" id="slug" required>

                        <div>
                            <label class="block text-sm font-medium mb-2">Imagem do Produto</label>
                            <input type="file" id="imagem" accept="image/*"
                                class="w-full px-4 py-2 bg-dh-darker border border-dh-magenta/30 rounded-lg text-white focus:border-dh-magenta focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-dh-magenta file:text-white hover:file:bg-dh-pink">
                            <div id="preview" class="mt-4"></div>
                        </div>

                        <button type="submit" 
                            class="w-full px-6 py-3 bg-gradient-to-r from-dh-magenta to-dh-purple rounded-full font-bold text-lg hover:shadow-glow-magenta transition-all">
                            Adicionar Produto
                        </button>
                    </form>
                </div>

                <!-- Lista de Produtos -->
                <div class="bg-gradient-dh border border-dh-gold/20 rounded-2xl p-6">
                    <h2 class="font-display text-2xl font-bold mb-6 text-dh-gold">Produtos Cadastrados</h2>
                    <div id="listaProdutos" class="space-y-4 max-h-[600px] overflow-y-auto">
                        <!-- Produtos serão carregados aqui -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer com créditos -->
        <footer class="mt-12 text-center text-gray-500 text-xs pb-4">
            <p>Desenvolvido por <span class="text-dh-magenta font-semibold">Patrick Lopes</span></p>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let categorias = [];
        let isAuthenticated = false;

        // Sistema de Autenticação
        const AUTH = {
            username: 'admin',
            password: 'admin'
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            if (username === AUTH.username && password === AUTH.password) {
                isAuthenticated = true;
                sessionStorage.setItem('dh_admin_auth', 'true');
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminContent').classList.add('authenticated');
                errorDiv.classList.add('hidden');
                inicializarAdmin();
            } else {
                errorDiv.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            isAuthenticated = false;
            sessionStorage.removeItem('dh_admin_auth');
            location.reload();
        });

        // Verificar autenticação ao carregar
        window.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('dh_admin_auth') === 'true') {
                isAuthenticated = true;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminContent').classList.add('authenticated');
                inicializarAdmin();
            }
        });

        // Carregar categorias
        async function carregarCategorias() {
            try {
                const response = await fetch(`${API_URL}/categorias`);
                const data = await response.json();
                
                if (data.success) {
                    categorias = data.data;
                    const select = document.getElementById('categoria_id');
                    select.innerHTML = '<option value="">Selecione...</option>' + 
                        categorias.map(cat => `<option value="${cat.id}">${cat.nome}</option>`).join('');
                }
            } catch (error) {
                console.error('Erro ao carregar categorias:', error);
            }
        }

        // Carregar produtos
        async function carregarProdutos() {
            try {
                const response = await fetch(`${API_URL}/produtos?limite=100`);
                const data = await response.json();
                
                if (data.success) {
                    const lista = document.getElementById('listaProdutos');
                    lista.innerHTML = data.data.map(p => `
                        <div class="bg-dh-darker/50 border border-dh-magenta/20 rounded-lg p-4">
                            <div class="flex gap-4">
                                ${p.imagem_url ? `<img src="http://localhost:3000${p.imagem_url}" class="w-20 h-20 object-cover rounded">` : ''}
                                <div class="flex-1">
                                    <h3 class="font-bold text-white">${p.nome}</h3>
                                    <p class="text-sm text-gray-400">${p.categoria_nome || 'Sem categoria'}</p>
                                    <p class="text-dh-gold font-bold mt-1">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                                    <p class="text-xs text-gray-500">Estoque: ${p.estoque} | ID: ${p.id}</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="excluirProduto(${p.id}, '${p.nome}')" 
                                        class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-xs font-semibold transition-all">
                                        🗑️ Excluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
            }
        }

        // Excluir produto
        async function excluirProduto(id, nome) {
            if (!confirm(`⚠️ Tem certeza que deseja excluir o produto:\n\n"${nome}"\n\nEsta ação não pode ser desfeita!`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/produtos/${id}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ Produto "${nome}" excluído com sucesso!`);
                    await carregarProdutos();
                } else {
                    alert(`❌ Erro ao excluir: ${data.error}`);
                }
            } catch (error) {
                console.error('Erro ao excluir produto:', error);
                alert('❌ Erro ao excluir produto');
            }
        }

        // Preview da imagem
        document.getElementById('imagem').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').innerHTML = 
                        `<img src="${e.target.result}" class="preview-image border-2 border-dh-magenta/30">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Gerar slug automaticamente
        document.getElementById('nome').addEventListener('input', function(e) {
            const slug = e.target.value
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
            document.getElementById('slug').value = slug;
        });

        // Submeter formulário
        document.getElementById('formProduto').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            
            try {
                let imagem_url = null;
                
                const imagemFile = document.getElementById('imagem').files[0];
                if (imagemFile) {
                    const formData = new FormData();
                    formData.append('imagem', imagemFile);
                    
                    const uploadResponse = await fetch(`${API_URL}/upload/produto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const uploadData = await uploadResponse.json();
                    if (uploadData.success) {
                        imagem_url = uploadData.data.url;
                    }
                }
                
                const produto = {
                    nome: document.getElementById('nome').value,
                    descricao: document.getElementById('descricao').value || null,
                    preco: parseFloat(document.getElementById('preco').value),
                    preco_promocional: document.getElementById('preco_promocional').value ? 
                        parseFloat(document.getElementById('preco_promocional').value) : null,
                    categoria_id: parseInt(document.getElementById('categoria_id').value),
                    estoque: parseInt(document.getElementById('estoque').value),
                    badge: document.getElementById('badge').value || null,
                    slug: document.getElementById('slug').value,
                    imagem_url: imagem_url
                };
                
                const response = await fetch(`${API_URL}/produtos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(produto)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Produto adicionado com sucesso!');
                    e.target.reset();
                    document.getElementById('preview').innerHTML = '';
                    await carregarProdutos();
                } else {
                    alert('❌ Erro: ' + data.error);
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao adicionar produto');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Adicionar Produto';
            }
        });

        // Inicializar admin
        async function inicializarAdmin() {
            await carregarCategorias();
            await carregarProdutos();
        }
    </script>
</body>
</html>
